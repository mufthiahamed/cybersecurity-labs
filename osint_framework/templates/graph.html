<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Graph — Scan #{{ scan.id }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#334155;--muted:#94a3b8;--head:#0f172a;
  --blue:#3b82f6;--purple:#8b5cf6;--green:#10b981;--red:#ef4444;
  --orange:#f97316;--teal:#14b8a6;--amber:#f59e0b;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}

/* grid bg */
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
                   linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:0.4;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:50;height:52px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 18px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);}
.nav-back{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;
  padding:5px 11px;border-radius:7px;border:1.5px solid var(--border);
  background:var(--surface2);transition:all .15s;}
.nav-back:hover{color:var(--blue);border-color:var(--blue);}
.nav-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--head);}
.nav-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:4px;}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.nav-btn{font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:7px;
  border:1.5px solid var(--border);background:var(--surface2);color:var(--text);
  cursor:pointer;transition:all .15s;}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.nav-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* CANVAS */
#canvas-wrap{position:fixed;inset:0;top:52px;}
canvas{display:block;width:100%;height:100%;cursor:grab;}
canvas.dragging{cursor:grabbing;}

/* LOADING */
#loading{position:fixed;inset:0;top:52px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:10;flex-direction:column;gap:12px;}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:var(--mono);font-size:12px;color:var(--muted);}

/* TOOLTIP */
#tooltip{position:fixed;z-index:100;background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.1);
  pointer-events:none;display:none;max-width:300px;}
.tt-type{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;}
.tt-val{font-family:var(--mono);font-size:12px;color:var(--head);word-break:break-all;line-height:1.5;}
.tt-src{font-size:11px;color:var(--muted);margin-top:4px;}
.tt-link{font-family:var(--mono);font-size:10px;color:var(--blue);margin-top:6px;display:block;}

/* LEGEND */
#legend{position:fixed;bottom:20px;left:18px;background:rgba(255,255,255,.95);
  backdrop-filter:blur(8px);border:1.5px solid var(--border);border-radius:10px;
  padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-width:160px;}
.leg-title{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:var(--text);}
.leg-item:last-child{margin-bottom:0;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* STATS */
#stats{position:fixed;bottom:20px;right:18px;background:rgba(255,255,255,.95);
  backdrop-filter:blur(8px);border:1.5px solid var(--border);border-radius:10px;
  padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.stat-row{display:flex;gap:20px;}
.stat-item{text-align:center;}
.stat-num{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--head);}
.stat-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

/* CONTROLS */
#controls{position:fixed;top:68px;right:14px;display:flex;flex-direction:column;gap:6px;}
.ctrl-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);
  background:rgba(255,255,255,.95);color:var(--text);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .15s;}
.ctrl-btn:hover{border-color:var(--blue);color:var(--blue);}

/* FILTER PANEL */
#filter-panel{position:fixed;top:68px;left:14px;background:rgba(255,255,255,.95);
  backdrop-filter:blur(8px);border:1.5px solid var(--border);border-radius:10px;
  padding:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-width:180px;}
.fp-title{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;}
.fp-item{display:flex;align-items:center;gap:7px;padding:4px 0;cursor:pointer;transition:all .15s;}
.fp-item:hover .fp-label{color:var(--blue);}
.fp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fp-label{font-family:var(--mono);font-size:11px;color:var(--text);}
.fp-count{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto;}
.fp-item.hidden .fp-label{opacity:.3;text-decoration:line-through;}

/* SCAN RUNNING NOTICE */
#running-notice{position:fixed;top:68px;left:50%;transform:translateX(-50%);
  background:rgba(59,130,246,.08);border:1.5px solid rgba(59,130,246,.25);
  border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:11px;color:var(--blue);
  display:flex;align-items:center;gap:8px;z-index:20;}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);
  animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="/scan/{{ scan.id }}">← Table</a>
  <span class="nav-title">Graph — #{{ scan.id }} {{ scan.target }}</span>
  <span class="nav-sub">{{ scan.target_type }}</span>
  <div class="nav-right">
    <button class="nav-btn" id="btn-labels" onclick="toggleLabels()">Labels</button>
    <button class="nav-btn" id="btn-flow" onclick="toggleFlow()">Flow dots</button>
    <button class="nav-btn" onclick="resetView()">Reset view</button>
  </div>
</nav>

<div id="loading">
  <div class="spin"></div>
  <div class="load-txt">Building graph…</div>
</div>

<div id="canvas-wrap" style="display:none">
  <canvas id="canvas"></canvas>
</div>

<div id="tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-val" id="tt-val"></div>
  <div class="tt-src" id="tt-src"></div>
  <a class="tt-link" id="tt-link" href="#" target="_blank" style="display:none">Open ↗</a>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="zoom(1.2)" title="Zoom in">+</button>
  <button class="ctrl-btn" onclick="zoom(0.8)" title="Zoom out">−</button>
  <button class="ctrl-btn" onclick="resetView()" title="Reset">⌖</button>
</div>

<div id="filter-panel">
  <div class="fp-title">Node Groups</div>
  <div id="fp-list"></div>
</div>

<div id="legend">
  <div class="leg-title">Legend</div>
  <div class="leg-item"><span class="leg-dot" style="background:#0f172a"></span>Target</div>
  <div class="leg-item"><span class="leg-dot" style="background:#3b82f6"></span>Module</div>
  <div class="leg-item"><span class="leg-dot" style="background:#94a3b8"></span>Result</div>
</div>

<div id="stats">
  <div class="stat-row">
    <div class="stat-item"><div class="stat-num" id="stat-nodes">0</div><div class="stat-lbl">Nodes</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-edges">0</div><div class="stat-lbl">Edges</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-results">0</div><div class="stat-lbl">Findings</div></div>
  </div>
</div>

{% if scan.status == 'running' %}
<div id="running-notice">
  <span class="pulse-dot"></span>
  Scan running — graph updates every 3s
</div>
{% endif %}

<script>
const SCAN_ID = {{ scan.id }};
const SCAN_STATUS = "{{ scan.status }}";

// ── Canvas setup ───────────────────────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W, H;

function resize() {
  const wrap = document.getElementById("canvas-wrap");
  W = canvas.width  = wrap.offsetWidth;
  H = canvas.height = wrap.offsetHeight;
}
window.addEventListener("resize", () => { resize(); });
resize();

// ── State ──────────────────────────────────────────────────────────────────────
let nodes = [], edges = [];
let showLabels = true, showFlow = true;
let hiddenGroups = new Set();
let flowParticles = [];
let animFrame = null;

// camera
let camX = 0, camY = 0, camScale = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, camStartX = 0, camStartY = 0;
let hoveredNode = null, selectedNode = null;

// ── Colour map ──────────────────────────────────────────────────────────────────
const GROUP_COLORS = {
  target:           "#0f172a",
  // modules
  github:           "#8b5cf6",
  reddit:           "#f97316",
  social:           "#3b82f6",
  breach:           "#ef4444",
  whois:            "#0ea5e9",
  dns:              "#10b981",
  ip:               "#14b8a6",
  phone:            "#f59e0b",
  // data types
  profile_url:      "#3b82f6",
  social_profile:   "#3b82f6",
  email_address:    "#ef4444",
  breach_found:     "#ef4444",
  breach_source:    "#f87171",
  breach_clean:     "#10b981",
  full_name:        "#8b5cf6",
  location:         "#8b5cf6",
  company:          "#8b5cf6",
  ip_address:       "#14b8a6",
  asn:              "#14b8a6",
  isp_org:          "#14b8a6",
  subdomain:        "#f97316",
  nameserver:       "#f97316",
  dns_a:            "#10b981",
  dns_mx:           "#10b981",
  dns_txt:          "#10b981",
  dns_ns:           "#10b981",
  repository:       "#8b5cf6",
  threat_intel:     "#ef4444",
  post_snippet:     "#f97316",
  subreddit_activity:"#f97316",
  phone_number:     "#f59e0b",
  carrier:          "#f59e0b",
};

function color(group) {
  return GROUP_COLORS[group] || "#94a3b8";
}

// ── Force simulation ─────────────────────────────────────────────────────────
const SIM = {
  repulsion:  4000,
  attraction: 0.04,
  centerPull: 0.012,
  damping:    0.82,
  minEnergy:  0.15,
};

function initPhysics() {
  nodes.forEach(n => {
    if (!n.x) {
      // spread nodes in a circle initially
      const angle = Math.random() * Math.PI * 2;
      const dist  = n.type === "target" ? 0 : n.type === "module" ? 120 + Math.random() * 60 : 240 + Math.random() * 120;
      n.x  = W / 2 + Math.cos(angle) * dist;
      n.y  = H / 2 + Math.sin(angle) * dist;
      n.vx = (Math.random() - 0.5) * 2;
      n.vy = (Math.random() - 0.5) * 2;
    }
  });
}

function stepPhysics() {
  const cx = W / 2, cy = H / 2;

  // repulsion between all nodes
  for (let i = 0; i < nodes.length; i++) {
    nodes[i].fx = 0; nodes[i].fy = 0;
    for (let j = 0; j < nodes.length; j++) {
      if (i === j) continue;
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist2 = dx * dx + dy * dy + 1;
      const force = SIM.repulsion / dist2;
      nodes[i].fx += dx * force;
      nodes[i].fy += dy * force;
    }
    // center pull
    nodes[i].fx += (cx - nodes[i].x) * SIM.centerPull;
    nodes[i].fy += (cy - nodes[i].y) * SIM.centerPull;
  }

  // attraction along edges
  edges.forEach(e => {
    const a = nodesById[e.from], b = nodesById[e.to];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
    const ideal = e.type === "module_link" ? 160 : 100;
    const force = (dist - ideal) * SIM.attraction;
    const fx = dx / dist * force, fy = dy / dist * force;
    a.fx += fx; a.fy += fy;
    b.fx -= fx; b.fy -= fy;
  });

  // integrate — skip pinned / selected nodes
  let energy = 0;
  nodes.forEach(n => {
    if (n.pinned || n === selectedNode) return;
    n.vx = (n.vx + n.fx) * SIM.damping;
    n.vy = (n.vy + n.fy) * SIM.damping;
    n.x += n.vx;
    n.y += n.vy;
    energy += Math.abs(n.vx) + Math.abs(n.vy);
  });
  return energy;
}

let nodesById = {};
let simEnergy = 999;

// ── Flow particles along edges ─────────────────────────────────────────────
function spawnFlow() {
  if (!showFlow) return;
  edges.forEach(e => {
    if (Math.random() > 0.08) return;
    const a = nodesById[e.from], b = nodesById[e.to];
    if (!a || !b) return;
    if (hiddenGroups.has(a.group) || hiddenGroups.has(b.group)) return;
    flowParticles.push({ from: a, to: b, t: 0, speed: 0.006 + Math.random() * 0.006,
      color: color(b.group) });
  });
}

// ── Draw ────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(camScale, camScale);

  const worldCX = (W / 2 - camX) / camScale;
  const worldCY = (H / 2 - camY) / camScale;

  // edges
  edges.forEach(e => {
    const a = nodesById[e.from], b = nodesById[e.to];
    if (!a || !b) return;
    if (hiddenGroups.has(a.group) || hiddenGroups.has(b.group)) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = e.type === "module_link" ? "#94a3b8" : "#e2e8f0";
    ctx.lineWidth   = e.type === "module_link" ? 1.5 / camScale : 1 / camScale;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // flow particles
  flowParticles = flowParticles.filter(p => p.t < 1);
  flowParticles.forEach(p => {
    p.t = Math.min(1, p.t + p.speed);
    const x = p.from.x + (p.to.x - p.from.x) * p.t;
    const y = p.from.y + (p.to.y - p.from.y) * p.t;
    const fade = p.t < 0.1 ? p.t / 0.1 : p.t > 0.85 ? (1 - p.t) / 0.15 : 1;
    const r = 3 / camScale;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = fade * 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // nodes
  nodes.forEach(n => {
    if (hiddenGroups.has(n.group)) return;
    const r = (n.size || 14) / camScale;
    const isHovered  = n === hoveredNode;
    const isSelected = n === selectedNode;
    const c = color(n.group);

    // glow for target + hovered
    if (n.type === "target" || isHovered || isSelected) {
      const glowR = r * 2.2;
      const grad = ctx.createRadialGradient(n.x, n.y, r * 0.3, n.x, n.y, glowR);
      grad.addColorStop(0, c + "44");
      grad.addColorStop(1, "transparent");
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // selection ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 5 / camScale, 0, Math.PI * 2);
      ctx.strokeStyle = "#0f172a";
      ctx.lineWidth = 2 / camScale;
      ctx.globalAlpha = 0.3;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    if (n.type === "target") {
      const g = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, 0, n.x, n.y, r);
      g.addColorStop(0, "#334155"); g.addColorStop(1, "#0f172a");
      ctx.fillStyle = g;
    } else if (n.type === "module") {
      const g = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, 0, n.x, n.y, r);
      g.addColorStop(0, c + "ff"); g.addColorStop(1, c + "bb");
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = c + "22";
    }
    ctx.fill();

    // border
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = n.type === "result" ? c + "88" : c;
    ctx.lineWidth = (n.type === "target" ? 2.5 : 1.8) / camScale;
    ctx.stroke();

    // label
    if (showLabels) {
      const fontSize = n.type === "target" ? 12 / camScale : n.type === "module" ? 10 / camScale : 9 / camScale;
      ctx.font = `${n.type !== "result" ? "600 " : ""}${fontSize}px Inter, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillStyle = n.type === "target" ? "#0f172a" : n.type === "module" ? c : "#64748b";

      const label = n.label.length > 28 ? n.label.slice(0, 26) + "…" : n.label;
      const yOff = r + 4 / camScale;

      // text shadow for readability
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = "#fff";
      ctx.fillText(label, n.x + 0.5 / camScale, n.y + yOff + 0.5 / camScale);
      ctx.globalAlpha = 1;
      ctx.fillStyle = n.type === "target" ? "#0f172a" : n.type === "module" ? c : "#64748b";
      ctx.fillText(label, n.x, n.y + yOff);
    }
  });

  ctx.restore();

  // spawn flow dots
  spawnFlow();

  simEnergy = stepPhysics();
  animFrame = requestAnimationFrame(draw);
}

// ── Hit test ──────────────────────────────────────────────────────────────────
function worldXY(ex, ey) {
  const rect = canvas.getBoundingClientRect();
  const mx = (ex - rect.left) * (canvas.width / rect.width);
  const my = (ey - rect.top)  * (canvas.height / rect.height);
  return { x: (mx - camX) / camScale, y: (my - camY) / camScale };
}

function hitNode(ex, ey) {
  const { x, y } = worldXY(ex, ey);
  return nodes.slice().reverse().find(n => {
    if (hiddenGroups.has(n.group)) return false;
    const r = (n.size || 14) / camScale;
    const dx = n.x - x, dy = n.y - y;
    return Math.sqrt(dx * dx + dy * dy) < r + 4 / camScale;
  });
}

// ── Mouse events ───────────────────────────────────────────────────────────────
canvas.addEventListener("mousedown", e => {
  const hit = hitNode(e.clientX, e.clientY);
  if (hit) {
    selectedNode = hit;
    hit.pinned = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    canvas.classList.add("dragging");
  } else {
    dragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    camStartX = camX; camStartY = camY;
    canvas.classList.add("dragging");
  }
});

canvas.addEventListener("mousemove", e => {
  if (selectedNode) {
    const { x, y } = worldXY(e.clientX, e.clientY);
    selectedNode.x = x; selectedNode.y = y;
    selectedNode.vx = 0; selectedNode.vy = 0;
    return;
  }
  if (dragging) {
    camX = camStartX + (e.clientX - dragStartX);
    camY = camStartY + (e.clientY - dragStartY);
    return;
  }
  const hit = hitNode(e.clientX, e.clientY);
  hoveredNode = hit || null;
  showTooltip(hit, e.clientX, e.clientY);
});

canvas.addEventListener("mouseup", e => {
  if (selectedNode) {
    // if barely moved, keep selected for tooltip; else just release drag
    const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
    if (Math.sqrt(dx*dx + dy*dy) < 5) {
      showTooltip(selectedNode, e.clientX, e.clientY);
    } else {
      selectedNode.pinned = true; // stays pinned where dropped
    }
    selectedNode = null;
  }
  dragging = false;
  canvas.classList.remove("dragging");
});

canvas.addEventListener("click", e => {
  const hit = hitNode(e.clientX, e.clientY);
  if (!hit) {
    hideTooltip();
    nodes.forEach(n => n.pinned = (n.type === "target"));
  }
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 0.88;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left), my = (e.clientY - rect.top);
  camX = mx - (mx - camX) * factor;
  camY = my - (my - camY) * factor;
  camScale = Math.max(0.15, Math.min(4, camScale * factor));
}, { passive: false });

// touch support
let lastTouchDist = 0;
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const hit = hitNode(t.clientX, t.clientY);
    if (hit) { selectedNode = hit; dragStartX = t.clientX; dragStartY = t.clientY; }
    else { dragging = true; dragStartX = t.clientX; dragStartY = t.clientY; camStartX = camX; camStartY = camY; }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (selectedNode) {
      const { x, y } = worldXY(t.clientX, t.clientY);
      selectedNode.x = x; selectedNode.y = y; selectedNode.vx = 0; selectedNode.vy = 0;
    } else if (dragging) {
      camX = camStartX + (t.clientX - dragStartX);
      camY = camStartY + (t.clientY - dragStartY);
    }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const factor = dist / (lastTouchDist || dist);
    camScale = Math.max(0.15, Math.min(4, camScale * factor));
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", () => { dragging = false; selectedNode = null; });

// ── Tooltip ────────────────────────────────────────────────────────────────────
function showTooltip(node, ex, ey) {
  if (!node) { hideTooltip(); return; }
  const tt = document.getElementById("tooltip");
  document.getElementById("tt-type").textContent = node.type === "target" ? "TARGET" : node.type.toUpperCase() + " · " + (node.group||"").toUpperCase();
  document.getElementById("tt-val").textContent  = node.full || node.label;
  document.getElementById("tt-src").textContent  = node.source || "";
  const link = document.getElementById("tt-link");
  const val = node.full || node.label;
  if (/^https?:\/\//i.test(val)) {
    link.href = val; link.style.display = "block";
  } else { link.style.display = "none"; }
  tt.style.display = "block";
  const ttW = tt.offsetWidth, ttH = tt.offsetHeight;
  let lx = ex + 14, ly = ey - 10;
  if (lx + ttW > window.innerWidth - 10) lx = ex - ttW - 14;
  if (ly + ttH > window.innerHeight - 10) ly = ey - ttH + 10;
  tt.style.left = lx + "px"; tt.style.top = ly + "px";
}
function hideTooltip() { document.getElementById("tooltip").style.display = "none"; }

// ── Auto fit graph into visible canvas ──────────────────────────────────────────
function autoFit() {
  if (!nodes.length || !W || !H) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x);
    maxY = Math.max(maxY, n.y);
  });

  const graphWidth = Math.max(maxX - minX, 1);
  const graphHeight = Math.max(maxY - minY, 1);
  const padding = 120;

  const scaleX = (W - padding) / graphWidth;
  const scaleY = (H - padding) / graphHeight;

  camScale = Math.max(0.2, Math.min(scaleX, scaleY, 1.5));

  const centerX = (minX + maxX) / 2;
  const centerY = (minY + maxY) / 2;

  camX = W / 2 - centerX * camScale;
  camY = H / 2 - centerY * camScale;
}

// ── Controls ───────────────────────────────────────────────────────────────────
function zoom(factor) {
  camX = W/2 - (W/2 - camX) * factor;
  camY = H/2 - (H/2 - camY) * factor;
  camScale = Math.max(0.15, Math.min(4, camScale * factor));
}
function resetView() {
  autoFit();
}
function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById("btn-labels").classList.toggle("active", showLabels);
}
function toggleFlow() {
  showFlow = !showFlow;
  document.getElementById("btn-flow").classList.toggle("active", showFlow);
}
document.getElementById("btn-labels").classList.add("active");
document.getElementById("btn-flow").classList.add("active");

// ── Filter panel ───────────────────────────────────────────────────────────────
function buildFilterPanel() {
  const groups = {};
  nodes.forEach(n => {
    if (n.type === "target") return;
    groups[n.group] = (groups[n.group] || 0) + 1;
  });
  const list = document.getElementById("fp-list");
  list.innerHTML = Object.entries(groups)
    .sort((a,b) => b[1]-a[1])
    .map(([g, cnt]) => `
      <div class="fp-item ${hiddenGroups.has(g)?'hidden':''}" data-group="${g}" onclick="toggleGroup('${g}')">
        <span class="fp-dot" style="background:${color(g)}"></span>
        <span class="fp-label">${g}</span>
        <span class="fp-count">${cnt}</span>
      </div>`).join("");
}
function toggleGroup(g) {
  if (hiddenGroups.has(g)) hiddenGroups.delete(g);
  else hiddenGroups.add(g);
  document.querySelector(`.fp-item[data-group="${g}"]`)?.classList.toggle("hidden", hiddenGroups.has(g));
}

// ── Load data & start ──────────────────────────────────────────────────────────
async function loadGraph() {
  const r = await fetch(`/api/scan/${SCAN_ID}/graph-data`);
  const d = await r.json();
  if (d.error) { document.getElementById("loading").innerHTML = `<div class="load-txt">Error: ${d.error}</div>`; return; }

  nodes = d.nodes;
  edges = d.edges;

  console.log("Graph nodes:", nodes);
  console.log("Graph edges:", edges);

  // IMPORTANT: show the canvas before measuring it.
  // If canvas-wrap is display:none, width/height becomes 0 and the graph is invisible.
  document.getElementById("canvas-wrap").style.display = "block";
  resize();

  nodesById = {};
  nodes.forEach(n => nodesById[n.id] = n);

  // pin target at center
  const t = nodes.find(n => n.type === "target");
  if (t) { t.x = W/2; t.y = H/2; t.vx=0; t.vy=0; t.pinned = true; }

  initPhysics();

  // Let the graph settle before first draw, then fit it into view
  for (let i = 0; i < 250; i++) {
    stepPhysics();
  }
  autoFit();

  buildFilterPanel();

  document.getElementById("stat-nodes").textContent   = nodes.length;
  document.getElementById("stat-edges").textContent   = edges.length;
  document.getElementById("stat-results").textContent = nodes.filter(n=>n.type==="result").length;

  document.getElementById("loading").style.display    = "none";

  if (animFrame) cancelAnimationFrame(animFrame);
  draw();
}

loadGraph();

// Poll while scan is running
if (SCAN_STATUS === "running") {
  setInterval(async () => {
    const prog = await (await fetch(`/api/scan/${SCAN_ID}/progress`)).json();
    if (prog.status !== "running") {
      document.getElementById("running-notice")?.remove();
    }
    // reload graph data
    const r = await fetch(`/api/scan/${SCAN_ID}/graph-data`);
    const d = await r.json();
    if (d.error) return;

    // merge new nodes — keep existing positions
    const existingIds = new Set(nodes.map(n => n.id));
    d.nodes.forEach(n => {
      if (!existingIds.has(n.id)) {
        n.x = W/2 + (Math.random()-0.5)*200;
        n.y = H/2 + (Math.random()-0.5)*200;
        n.vx = 0; n.vy = 0;
        nodes.push(n);
        nodesById[n.id] = n;
      }
    });
    edges = d.edges;
    buildFilterPanel();
    document.getElementById("stat-nodes").textContent   = nodes.length;
    document.getElementById("stat-edges").textContent   = edges.length;
    document.getElementById("stat-results").textContent = nodes.filter(n=>n.type==="result").length;
  }, 3000);
}
</script>
